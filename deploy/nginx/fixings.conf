# fixings-service — docker nginx server block.
# Copy into the proxy-auth auth stack's conf.d/ (see proxy-auth SETUP "add an app"),
# then add an Authelia access_control rule: <fixings host> -> two_factor.

server {
    listen 80;
    server_name FIXINGS_HOST;   # the app's public host, e.g. fixings.example.com

    resolver 127.0.0.11 valid=30s;   # Docker embedded DNS — re-resolve on restart

    # container:port of the app on the `proxy` network (compose sets container_name).
    set $upstream_app http://fixings-service:5000;

    include /etc/nginx/snippets/authelia-location.conf;

    location / {
        include /etc/nginx/snippets/proxy.conf;
        include /etc/nginx/snippets/authelia-authrequest.conf;   # invariant 5 — never omit
        proxy_pass $upstream_app;
    }
}
